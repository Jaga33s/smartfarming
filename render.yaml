databases:
  - name: smart-farming-db
    plan: free
    databaseName: smart_farming
    user: smart_farming_user

services:
  # --- Backend: FastAPI ---
  - type: web
    name: smart-farming-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-farming-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        value: https://smart-farming-frontend.onrender.com

  # --- Frontend: Next.js ---
  - type: web
    name: smart-farming-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://smart-farming-backend.onrender.com
